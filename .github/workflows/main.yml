name: Create New Release

on:
  workflow_dispatch:
    inputs:
      releaseNumber:
        description: 'Release number (e.g. v1.2.3)'
        required: true

      sourceBranch:
        description: 'Source branch'
        required: true
        default: master

      pat:
        description: 'GitHub PAT'
        required: true

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.sourceBranch }}
          token: ${{ github.event.inputs.pat }}
          fetch-depth: 0

      - name: Validate releaseNumber format
        run: |
          if [[ ! "${{ github.event.inputs.releaseNumber }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Set Variables
        run: |
          echo "TAG_NAME=${{ github.event.inputs.releaseNumber }}" >> $GITHUB_ENV

      - name: Move releases/UpcomingRelease → releases/${{ env.TAG_NAME  }}
        shell: bash
        run: |
          if [[ -d releases/UpcomingRelease ]]; then
            git mv releases/UpcomingRelease "releases/${{ env.TAG_NAME  }}"
          else
            echo "Directory releases/UpcomingRelease does not exist; skipping move."
          fi

      - name: Commit Changes
        run: |
          git add releases

          git commit -m "Prepare release ${{ env.TAG_NAME }}" || echo "No changes"

          git pull --rebase origin "${{ github.event.inputs.sourceBranch }}"

          git push origin HEAD:${{ github.event.inputs.sourceBranch }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          target_commitish: ${{ github.event.inputs.sourceBranch }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.event.inputs.pat }}

      - name: Wait for GitHub Release
        run: sleep 5

      - name: Fetch Release Notes using GitHub API
        env:
          GH_TOKEN: ${{ github.event.inputs.pat }}
        run: |

          API_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ env.TAG_NAME }}"

          RESPONSE=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL")

          BODY=$(echo "$RESPONSE" | jq -r '.body')

          FILE=RELEASE_NOTES.md
          TEMP_FILE=temp_release_notes.md
          { 
            echo "## [${{ env.TAG_NAME }}](${RELEASE_URL})" 
            echo "" 
            echo "$BODY"
            echo "" 
            echo "---" 
            echo "" 
          } > $TEMP_FILE
          if [ -f "$FILE" ]; then 
            cat "$FILE" >> $TEMP_FILE 
          fi
          mv $TEMP_FILE $FILE
          echo "Generated RELEASE_NOTES.md"
          cat RELEASE_NOTES.md

      - name: Commit RELEASE_NOTES.md
        run: |
          git add RELEASE_NOTES.md

          git commit -m "Add release notes for ${{ env.TAG_NAME }}" || echo "No changes"

          git push origin HEAD:${{ github.event.inputs.sourceBranch }}
